<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact API Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Contact Us</h2>

        <div id="alertBox" class="hidden mb-4 p-3 rounded-md text-sm text-center font-medium"></div>

        <form id="contactForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Name *</label>
                <input type="text" id="name" required placeholder="John Doe"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email *</label>
                <input type="email" id="email" required placeholder="john@example.com"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label>
                <input type="text" id="subject" placeholder="What is this regarding?"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Message *</label>
                <textarea id="message" rows="4" required placeholder="Type your message here..."
                    class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <button type="submit"
                class="w-full flex justify-center py-2.5 px-4 rounded-md shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Submit Data
            </button>
        </form>
    </div>

    <script>
        // Frontend Client-Side Logic
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();
            const alertBox = document.getElementById('alertBox');
            const submitBtn = e.target.querySelector('button');

            // Client-side Validation
            if (!name || !email || !message) {
                showAlert('Please fill in all required fields.', 'red');
                return;
            }

            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/contacts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, subject, message })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Message sent successfully! Status: 201', 'green');
                    document.getElementById('contactForm').reset(); // Clear form
                } else {
                    showAlert(`Error: ${data.error}`, 'red');
                }
            } catch (error) {
                showAlert('Failed to connect to the server.', 'red');
            } finally {
                submitBtn.textContent = "Submit Data";
                submitBtn.disabled = false;
            }
        });

        function showAlert(msg, color) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'border-red-400', 'bg-green-100', 'text-green-700', 'border-green-400');

            if (color === 'red') {
                alertBox.classList.add('block', 'bg-red-100', 'text-red-700', 'border', 'border-red-400');
            } else {
                alertBox.classList.add('block', 'bg-green-100', 'text-green-700', 'border', 'border-green-400');
            }
        }
    </script>
</body>

</html>
